<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Candy Daily Pulse · 每日脉动</title>
<meta name="theme-color" content="#ff6b6b" />
<link rel="manifest" href="manifest.json" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Daily Pulse" />
<style>
  :root{
    /* Sunrise Coral · 晨曦珊瑚 — bright, warm, hopeful */
    --bg:#fff8f3; --bg2:#ffece0; --card:#ffffff; --card2:#fff2ea;
    --purple:#ff6b6b; --purple-soft:#ff8787; --neon:#ff922b; --pink:#ff8fab;
    --green:#12b886; --red:#fa5252; --text:#3a2a20; --muted:#9c8579;
    --line:#ffe3d3; --gold:#f59f00;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{
    margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;
    background:radial-gradient(circle at 18% -10%,#ffd9c2 0%,transparent 55%),
               radial-gradient(circle at 92% 0%,#ffd6e0 0%,transparent 48%),
               linear-gradient(165deg,var(--bg),var(--bg2));
    background-attachment:fixed; color:var(--text);
    min-height:100vh; padding-bottom:90px;
  }
  .wrap{max-width:680px; margin:0 auto; padding:16px;}
  header{display:flex; align-items:center; justify-content:space-between; padding:8px 4px 6px;}
  .logo{display:flex; align-items:center; gap:10px; font-weight:800; font-size:19px;}
  .logo .dot{width:12px; height:12px; border-radius:50%; background:var(--neon); box-shadow:0 0 14px var(--neon); animation:pulse 1.6s infinite;}
  @keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.5);opacity:.55}}
  .lang-btn{background:var(--card2); border:1px solid var(--line); color:var(--text); border-radius:20px; padding:6px 14px; font-size:13px; cursor:pointer; font-weight:600;}

  /* Greeting */
  .greet{padding:6px 6px 14px;}
  .greet .hi{font-size:23px; font-weight:800; background:linear-gradient(90deg,var(--purple-soft),var(--neon),var(--pink)); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;}
  .greet .quote{font-size:13px; color:var(--muted); margin-top:5px; line-height:1.5;}

  /* Countdown banner */
  .countdown{display:flex; align-items:center; justify-content:center; gap:10px; background:linear-gradient(90deg,rgba(255,107,107,.14),rgba(255,146,43,.16)); border:1px solid var(--line); border-radius:14px; padding:10px 14px; margin-bottom:16px; font-size:14px;}
  .countdown b{font-size:22px; color:var(--gold); font-weight:800; letter-spacing:.5px;}
  .countdown .fire{font-size:18px;}

  .card{background:var(--card); border:1px solid var(--line); border-radius:18px; padding:18px; margin-bottom:16px; box-shadow:0 8px 28px rgba(255,138,76,.16);}
  .card h2{margin:0 0 14px; font-size:14px; letter-spacing:.6px; color:var(--muted); text-transform:uppercase; font-weight:700;}

  .goal-top{display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:12px;}
  .goal-now{font-size:30px; font-weight:800;}
  .goal-target{font-size:13px; color:var(--muted);}
  .bar{height:14px; background:var(--card2); border-radius:10px; overflow:hidden; margin:6px 0 12px; position:relative;}
  .bar > div{height:100%; background:linear-gradient(90deg,var(--purple),var(--neon),var(--gold)); border-radius:10px; transition:width .7s cubic-bezier(.2,.8,.2,1); width:0; box-shadow:0 0 12px var(--neon);}
  .ticks{position:absolute; inset:0; display:flex; pointer-events:none;}
  .ticks span{flex:1; border-right:1px dashed rgba(0,0,0,.12);}
  .ticks span:last-child{border:none;}
  .goal-stats{display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:6px;}
  .stat{background:var(--card2); border-radius:12px; padding:10px; text-align:center;}
  .stat .v{font-size:17px; font-weight:700;}
  .stat .l{font-size:11px; color:var(--muted); margin-top:2px;}

  .seg{display:flex; gap:8px; margin-bottom:12px;}
  .seg button{flex:1; padding:12px; border-radius:12px; border:1px solid var(--line); background:var(--card2); color:var(--text); font-weight:700; font-size:15px; cursor:pointer; transition:.2s;}
  .seg button.act-income{background:var(--green); color:#062b1f; border-color:var(--green);}
  .seg button.act-expense{background:var(--red); color:#3a0512; border-color:var(--red);}
  label{display:block; font-size:12px; color:var(--muted); margin:10px 0 5px; font-weight:600;}
  input,select{width:100%; padding:13px; border-radius:12px; border:1px solid var(--line); background:var(--card2); color:var(--text); font-size:16px; outline:none;}
  input:focus,select:focus{border-color:var(--neon); box-shadow:0 0 0 3px rgba(255,146,43,.2);}
  .row{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .add-btn{width:100%; margin-top:16px; padding:15px; border:none; border-radius:14px; background:linear-gradient(90deg,var(--purple),var(--neon)); color:#fff; font-size:16px; font-weight:800; cursor:pointer; box-shadow:0 6px 20px rgba(255,107,107,.4);}
  .add-btn:active{transform:scale(.98);}

  .rec{display:flex; align-items:center; justify-content:space-between; padding:12px 0; border-bottom:1px solid var(--line);}
  .rec:last-child{border-bottom:none;}
  .rec .info{display:flex; flex-direction:column; gap:3px;}
  .rec .biz{font-weight:700; font-size:15px;}
  .rec .note{font-size:12px; color:var(--muted);}
  .rec .right{display:flex; align-items:center; gap:12px;}
  .amt{font-weight:800; font-size:16px;}
  .amt.income{color:var(--green);} .amt.expense{color:var(--red);}
  .del{background:none; border:none; color:var(--muted); font-size:18px; cursor:pointer; padding:4px;}
  .empty{color:var(--muted); text-align:center; padding:20px 0; font-size:14px;}

  .sum-row{display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--line); font-size:14px;}
  .sum-row:last-child{border-bottom:none;}
  .sum-row.total{font-weight:800; border-top:2px solid var(--line); margin-top:4px; padding-top:14px;}
  .sum-name{flex:1;} .sum-val{width:90px; text-align:right;}
  .pos{color:var(--green);} .neg{color:var(--red);}

  nav{position:fixed; bottom:0; left:0; right:0; background:rgba(255,248,243,.93); backdrop-filter:blur(12px); border-top:1px solid var(--line); display:flex; justify-content:space-around; padding:8px 0 max(8px,env(safe-area-inset-bottom));}
  nav button{background:none; border:none; color:var(--muted); font-size:11px; display:flex; flex-direction:column; align-items:center; gap:3px; cursor:pointer; padding:6px 14px; font-weight:600;}
  nav button .ic{font-size:20px;}
  nav button.active{color:var(--neon);}

  .view{display:none;} .view.active{display:block; animation:fade .3s;}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  .tools{display:flex; gap:10px; margin-top:8px;}
  .tools button{flex:1; padding:11px; border-radius:12px; border:1px solid var(--line); background:var(--card2); color:var(--text); font-weight:600; cursor:pointer; font-size:13px;}
  .hint{font-size:12px; color:var(--muted); line-height:1.6; margin-top:10px;}
  .date-head{font-size:13px; color:var(--muted); margin:0 0 8px; font-weight:600;}

  /* Celebration overlay */
  #celebrate{position:fixed; inset:0; z-index:50; display:none; align-items:center; justify-content:center; background:rgba(58,42,32,.45); backdrop-filter:blur(4px);}
  #celebrate.show{display:flex; animation:fade .3s;}
  .cele-card{background:linear-gradient(160deg,var(--card2),var(--card)); border:1px solid var(--neon); border-radius:22px; padding:30px 34px; text-align:center; box-shadow:0 12px 50px rgba(255,107,107,.45); max-width:300px;}
  .cele-card .big{font-size:54px; margin-bottom:8px;}
  .cele-card .ttl{font-size:22px; font-weight:800; margin-bottom:6px;}
  .cele-card .sub{font-size:14px; color:var(--muted); margin-bottom:18px; line-height:1.6;}
  .cele-card button{padding:11px 26px; border:none; border-radius:12px; background:linear-gradient(90deg,var(--purple),var(--neon)); color:#fff; font-weight:800; font-size:15px; cursor:pointer;}
  .confetti{position:fixed; top:-10px; font-size:20px; pointer-events:none; z-index:49; animation:fall linear forwards;}
  @keyframes fall{to{transform:translateY(105vh) rotate(540deg); opacity:0;}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo"><span class="dot"></span><span>Candy Daily Pulse</span></div>
    <button class="lang-btn" id="langBtn">EN</button>
  </header>

  <div class="greet">
    <div class="hi" id="greetHi">你好，Candy</div>
    <div class="quote" id="greetQuote"></div>
  </div>

  <div class="countdown">
    <span class="fire">⏳</span>
    <span data-i18n="cdPre">距 2026 年底还剩</span>
    <b id="cdDays">0</b>
    <span data-i18n="cdPost">天</span>
  </div>

  <!-- ===== TODAY ===== -->
  <div class="view active" id="view-today">
    <div class="card" id="goalCard">
      <h2 data-i18n="goalTitle">2026 目标进度</h2>
      <div class="goal-top">
        <div><div class="goal-now" id="goalNow">$0</div>
        <div class="goal-target" data-i18n="goalTargetLabel">目标 税后净收入 AU$200,000</div></div>
        <div class="goal-now" id="goalPct" style="color:var(--gold)">0%</div>
      </div>
      <div class="bar"><div id="goalBar"></div>
        <div class="ticks"><span></span><span></span><span></span><span></span></div>
      </div>
      <div class="goal-stats">
        <div class="stat"><div class="v" id="stRemain">$200,000</div><div class="l" data-i18n="stRemain">还差</div></div>
        <div class="stat"><div class="v" id="stStreak">0</div><div class="l" data-i18n="stStreak">连续记账</div></div>
        <div class="stat"><div class="v" id="stDaily">$0</div><div class="l" data-i18n="stDaily">日均需达成</div></div>
      </div>
    </div>

    <div class="card">
      <h2 data-i18n="addTitle">记一笔</h2>
      <div class="seg">
        <button id="segIncome" data-i18n="income">收入</button>
        <button id="segExpense" data-i18n="expense">支出</button>
      </div>
      <label data-i18n="business">生意</label>
      <select id="bizSel"></select>
      <div class="row">
        <div><label data-i18n="amount">金额 (AU$)</label><input id="amtIn" type="number" inputmode="decimal" placeholder="0.00" /></div>
        <div><label data-i18n="date">日期</label><input id="dateIn" type="date" /></div>
      </div>
      <label data-i18n="note">备注（可选）</label>
      <input id="noteIn" type="text" placeholder="..." />
      <button class="add-btn" id="addBtn" data-i18n="addBtn">＋ 添加记录</button>
    </div>

    <div class="card">
      <h2 data-i18n="todayTitle">今日记录</h2>
      <div id="todayList"></div>
    </div>
  </div>

  <!-- ===== SUMMARY ===== -->
  <div class="view" id="view-summary">
    <div class="card">
      <h2 data-i18n="sumTitle">分生意汇总</h2>
      <div id="sumTable"></div>
    </div>
    <div class="card">
      <h2 data-i18n="afterTaxTitle">税后净收入</h2>
      <div class="goal-stats">
        <div class="stat"><div class="v pos" id="sumIncome">$0</div><div class="l" data-i18n="income">收入</div></div>
        <div class="stat"><div class="v neg" id="sumExpense">$0</div><div class="l" data-i18n="expense">支出</div></div>
        <div class="stat"><div class="v" id="sumAfterTax">$0</div><div class="l" data-i18n="afterTax">税后净 (×0.75)</div></div>
      </div>
      <p class="hint" data-i18n="taxHint">税后净收入 = (总收入 − 总支出) × 0.75（税率 25%）</p>
    </div>
  </div>

  <!-- ===== ALL ===== -->
  <div class="view" id="view-all">
    <div class="card">
      <h2 data-i18n="allTitle">全部记录</h2>
      <div id="allList"></div>
    </div>
    <div class="card">
      <h2 data-i18n="dataTitle">数据备份</h2>
      <div class="tools">
        <button id="exportBtn" data-i18n="export">导出 JSON</button>
        <button id="importBtn" data-i18n="import">导入 JSON</button>
      </div>
      <input id="fileIn" type="file" accept="application/json" style="display:none" />
      <p class="hint" data-i18n="dataHint">数据保存在本机浏览器中。换设备或清缓存前请先导出备份。导入格式兼容原 Python 工具的 pulse_data.json。</p>
    </div>
  </div>
</div>

<nav>
  <button data-tab="today" class="active"><span class="ic">✏️</span><span data-i18n="navToday">记账</span></button>
  <button data-tab="summary"><span class="ic">📊</span><span data-i18n="navSummary">汇总</span></button>
  <button data-tab="all"><span class="ic">📒</span><span data-i18n="navAll">全部</span></button>
</nav>

<!-- Celebration -->
<div id="celebrate"><div class="cele-card">
  <div class="big" id="celeEmoji">🎉</div>
  <div class="ttl" id="celeTtl"></div>
  <div class="sub" id="celeSub"></div>
  <button id="celeClose" data-i18n="celeBtn">继续加油 →</button>
</div></div>

<script>
/* ============ Config ============ */
const NAME = "Candy";
const GOAL = 200000;
const TAX_KEEP = 0.75;
const YEAR_END = "2026-12-31";

const BUSINESSES = [
  {code:"camp",       zh:"青少年创业营", en:"Youth Entrepreneurship Camp"},
  {code:"clothing",   zh:"童装店",       en:"Kids Clothing Store"},
  {code:"youtube",    zh:"YouTube 频道", en:"YouTube Channel"},
  {code:"secondhand", zh:"二手书玩具店", en:"Secondhand Toy & Book Store"},
];

const I18N = {
  zh:{ goalTitle:"2026 目标进度", goalTargetLabel:"目标 税后净收入 AU$200,000",
    stRemain:"还差", stStreak:"连续记账", stDaily:"日均需达成",
    addTitle:"记一笔", income:"收入", expense:"支出", business:"生意",
    amount:"金额 (AU$)", date:"日期", note:"备注（可选）", addBtn:"＋ 添加记录",
    todayTitle:"今日记录", sumTitle:"分生意汇总", afterTaxTitle:"税后净收入",
    afterTax:"税后净 (×0.75)", taxHint:"税后净收入 = (总收入 − 总支出) × 0.75（税率 25%）",
    allTitle:"全部记录", dataTitle:"数据备份", export:"导出 JSON", import:"导入 JSON",
    dataHint:"数据保存在本机浏览器中。换设备或清缓存前请先导出备份。导入格式兼容原 Python 工具的 pulse_data.json。",
    navToday:"记账", navSummary:"汇总", navAll:"全部",
    emptyToday:"今天还没有记录，记一笔吧 ✏️", emptyAll:"还没有任何记录",
    confirmDel:"确定删除这条记录吗？", needAmt:"请输入有效金额",
    cdPre:"距 2026 年底还剩", cdPost:"天", day:"天", celeBtn:"继续加油 →",
    gM:"早上好", gA:"下午好", gE:"晚上好", gN:"夜深了",
    celeTtl:p=>`达成 ${p}% 啦！`,
    celeSub:{25:"四分之一目标已拿下，节奏很稳 👏",50:"已经走完一半路程，了不起！🚀",75:"四分之三达成，胜利在望 💪",100:"🏆 2026 目标 100% 达成！你做到了！"},
    quotes:[
      "每一笔记录，都是离目标更近的一步。",
      "稳扎稳打，AU$200,000 不是梦。",
      "今天的努力，是明天的底气。",
      "四个生意一起发力，加油 Candy！",
      "记账是认真生活的开始 ✨",
      "积少成多，每天进步一点点。",
      "目标清晰的人，运气都不会太差。",
      "坚持记账的你，已经赢了大多数人。",
    ],
    qStart:"刚刚起步，未来可期，冲！",
    qMid:"已经过半，保持这个势头！",
    qNear:"胜利在望，再加把劲！",
    qDone:"🏆 目标已达成，你太棒了！" },
  en:{ goalTitle:"2026 Goal Progress", goalTargetLabel:"Target after-tax net AU$200,000",
    stRemain:"Remaining", stStreak:"Streak", stDaily:"Daily target",
    addTitle:"Add a record", income:"Income", expense:"Expense", business:"Business",
    amount:"Amount (AU$)", date:"Date", note:"Note (optional)", addBtn:"＋ Add record",
    todayTitle:"Today's records", sumTitle:"Summary by business", afterTaxTitle:"After-tax net income",
    afterTax:"After-tax (×0.75)", taxHint:"After-tax net = (income − expense) × 0.75 (25% tax)",
    allTitle:"All records", dataTitle:"Data backup", export:"Export JSON", import:"Import JSON",
    dataHint:"Data is stored in this browser. Export a backup before switching devices or clearing cache. Import is compatible with the original Python tool's pulse_data.json.",
    navToday:"Log", navSummary:"Summary", navAll:"All",
    emptyToday:"No records today yet — add one ✏️", emptyAll:"No records yet",
    confirmDel:"Delete this record?", needAmt:"Enter a valid amount",
    cdPre:"Days left until end of 2026:", cdPost:"d", day:"d", celeBtn:"Keep going →",
    gM:"Good morning", gA:"Good afternoon", gE:"Good evening", gN:"Late night",
    celeTtl:p=>`${p}% reached!`,
    celeSub:{25:"A quarter of the way — great pace 👏",50:"Halfway there. Amazing! 🚀",75:"Three quarters done — almost there 💪",100:"🏆 2026 goal 100% complete! You did it!"},
    quotes:[
      "Every record is one step closer to the goal.",
      "Steady wins — AU$200,000 is within reach.",
      "Today's effort is tomorrow's confidence.",
      "Four businesses, one goal. Go Candy!",
      "Tracking is where serious living begins ✨",
      "Small amounts add up, day by day.",
      "Clear goals make luck inevitable.",
      "By tracking daily, you're already ahead.",
    ],
    qStart:"Just getting started — the future is bright!",
    qMid:"Past halfway — keep the momentum!",
    qNear:"Victory in sight — push a little more!",
    qDone:"🏆 Goal reached — you're amazing!" },
};

/* ============ State ============ */
let lang = localStorage.getItem("cdp_lang") || "zh";
let records = load();
let curType = "income";

function load(){ try{ return JSON.parse(localStorage.getItem("cdp_records")||"[]"); }catch(e){ return []; } }
function save(){ localStorage.setItem("cdp_records", JSON.stringify(records)); }
function t(k){ return I18N[lang][k]; }
function bizName(code){ const b=BUSINESSES.find(x=>x.code===code); return b? (lang==="zh"?b.zh:b.en) : code; }
function money(n){ return "$"+Math.round(n).toLocaleString("en-AU"); }
function todayStr(){ const d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }

/* ============ Calculations ============ */
function totals(){
  let income=0, expense=0; const byBiz={};
  BUSINESSES.forEach(b=>byBiz[b.code]={income:0,expense:0});
  records.forEach(r=>{
    if(!byBiz[r.business]) byBiz[r.business]={income:0,expense:0};
    if(r.type==="income"){ income+=r.amount; byBiz[r.business].income+=r.amount; }
    else { expense+=r.amount; byBiz[r.business].expense+=r.amount; }
  });
  const net=income-expense; const afterTax=net*TAX_KEEP;
  return {income, expense, net, afterTax, byBiz};
}
function daysLeft(){
  const end=new Date(YEAR_END+"T23:59:59"); const now=new Date();
  const d=Math.ceil((end-now)/86400000); return d>0?d:0;
}
function streak(){
  if(!records.length) return 0;
  const set=new Set(records.map(r=>r.date));
  let s=0; const d=new Date();
  // allow today empty: start from today, if today missing start from yesterday
  if(!set.has(fmt(d))) d.setDate(d.getDate()-1);
  while(set.has(fmt(d))){ s++; d.setDate(d.getDate()-1); }
  return s;
}
function fmt(d){ return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }

/* ============ Greeting + quote ============ */
function greeting(){
  const h=new Date().getHours();
  if(h<5) return t("gN"); if(h<12) return t("gM"); if(h<18) return t("gA"); return t("gE");
}
function dailyQuote(){
  const {afterTax}=totals(); const pct=afterTax/GOAL*100;
  if(pct>=100) return t("qDone");
  // stable per-day base quote
  const day=Math.floor((new Date()-new Date(new Date().getFullYear(),0,0))/86400000);
  const base=t("quotes")[day % t("quotes").length];
  let tail="";
  if(pct>=75) tail=" "+t("qNear"); else if(pct>=50) tail=" "+t("qMid"); else if(pct>0) tail=" "+t("qStart");
  return base+tail;
}

/* ============ Celebration ============ */
function checkMilestone(){
  const {afterTax}=totals(); const pct=afterTax/GOAL*100;
  const prev=parseInt(localStorage.getItem("cdp_milestone")||"0");
  let reached=0; [25,50,75,100].forEach(m=>{ if(pct>=m) reached=m; });
  if(reached>prev){ localStorage.setItem("cdp_milestone", String(reached)); celebrate(reached); }
  else if(reached<prev){ localStorage.setItem("cdp_milestone", String(reached)); }
}
function celebrate(m){
  document.getElementById("celeEmoji").textContent = m===100?"🏆":"🎉";
  document.getElementById("celeTtl").textContent = t("celeTtl")(m);
  document.getElementById("celeSub").textContent = t("celeSub")[m];
  document.getElementById("celebrate").classList.add("show");
  confettiBurst();
}
function confettiBurst(){
  const emojis=["🎉","✨","🧡","🎊","⭐","💪","🥳"];
  for(let i=0;i<32;i++){
    const c=document.createElement("div"); c.className="confetti";
    c.textContent=emojis[i%emojis.length];
    c.style.left=(Math.random()*100)+"vw";
    c.style.animationDuration=(2+Math.random()*2)+"s";
    c.style.animationDelay=(Math.random()*0.4)+"s";
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),4500);
  }
}
document.getElementById("celeClose").onclick=()=>document.getElementById("celebrate").classList.remove("show");

/* ============ Render ============ */
function renderGreet(){
  document.getElementById("greetHi").textContent = greeting()+"，"+NAME+" ☀️";
  if(lang!=="zh") document.getElementById("greetHi").textContent = greeting()+", "+NAME+" ☀️";
  document.getElementById("greetQuote").textContent = dailyQuote();
  document.getElementById("cdDays").textContent = daysLeft();
}
function renderGoal(){
  const {afterTax}=totals();
  const pct=Math.max(0,Math.min(100, afterTax/GOAL*100));
  document.getElementById("goalNow").textContent=money(afterTax);
  document.getElementById("goalPct").textContent=pct.toFixed(1)+"%";
  document.getElementById("goalBar").style.width=pct+"%";
  const remain=Math.max(0,GOAL-afterTax); const dl=daysLeft();
  document.getElementById("stRemain").textContent=money(remain);
  document.getElementById("stStreak").textContent=streak()+" 🔥";
  document.getElementById("stDaily").textContent= dl>0? money(remain/dl) : money(remain);
}
function recItem(r, idx){
  const div=document.createElement("div"); div.className="rec";
  div.innerHTML=`<div class="info"><span class="biz">${bizName(r.business)}</span>
    <span class="note">${r.date}${r.note? " · "+escapeHtml(r.note):""}</span></div>
    <div class="right"><span class="amt ${r.type}">${r.type==="income"?"+":"−"}${money(r.amount)}</span>
    <button class="del" data-i="${idx}">✕</button></div>`;
  return div;
}
function escapeHtml(s){ return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function renderToday(){
  const list=document.getElementById("todayList"); list.innerHTML="";
  const today=todayStr();
  const items=records.map((r,i)=>({r,i})).filter(x=>x.r.date===today).reverse();
  if(!items.length){ list.innerHTML=`<div class="empty">${t("emptyToday")}</div>`; return; }
  items.forEach(x=>list.appendChild(recItem(x.r,x.i)));
}
function renderAll(){
  const list=document.getElementById("allList"); list.innerHTML="";
  if(!records.length){ list.innerHTML=`<div class="empty">${t("emptyAll")}</div>`; return; }
  const items=records.map((r,i)=>({r,i})).sort((a,b)=> a.r.date<b.r.date?1:-1);
  let curDate="";
  items.forEach(x=>{
    if(x.r.date!==curDate){ curDate=x.r.date; const h=document.createElement("div"); h.className="date-head"; h.textContent=curDate; list.appendChild(h); }
    list.appendChild(recItem(x.r,x.i));
  });
}
function renderSummary(){
  const {income,expense,afterTax,byBiz}=totals();
  const tb=document.getElementById("sumTable"); tb.innerHTML="";
  BUSINESSES.forEach(b=>{
    const d=byBiz[b.code]; const net=d.income-d.expense;
    const row=document.createElement("div"); row.className="sum-row";
    row.innerHTML=`<span class="sum-name">${bizName(b.code)}</span>
      <span class="sum-val pos">+${money(d.income)}</span>
      <span class="sum-val neg">−${money(d.expense)}</span>
      <span class="sum-val ${net>=0?'pos':'neg'}">${money(net)}</span>`;
    tb.appendChild(row);
  });
  const net=income-expense;
  const tr=document.createElement("div"); tr.className="sum-row total";
  tr.innerHTML=`<span class="sum-name">Σ</span>
    <span class="sum-val pos">+${money(income)}</span>
    <span class="sum-val neg">−${money(expense)}</span>
    <span class="sum-val ${net>=0?'pos':'neg'}">${money(net)}</span>`;
  tb.appendChild(tr);
  document.getElementById("sumIncome").textContent=money(income);
  document.getElementById("sumExpense").textContent=money(expense);
  document.getElementById("sumAfterTax").textContent=money(afterTax);
}
function renderAllViews(){ renderGreet(); renderGoal(); renderToday(); renderSummary(); renderAll(); }

/* ============ i18n + biz select ============ */
function applyLang(){
  document.documentElement.lang = lang==="zh"?"zh":"en";
  document.getElementById("langBtn").textContent = lang==="zh"?"EN":"中";
  document.querySelectorAll("[data-i18n]").forEach(el=>{ const k=el.getAttribute("data-i18n"); const v=I18N[lang][k]; if(typeof v==="string") el.textContent=v; });
  const sel=document.getElementById("bizSel"); const cur=sel.value;
  sel.innerHTML=""; BUSINESSES.forEach(b=>{ const o=document.createElement("option"); o.value=b.code; o.textContent=lang==="zh"?b.zh:b.en; sel.appendChild(o); });
  if(cur) sel.value=cur;
  renderAllViews();
}

/* ============ Events ============ */
function setType(type){
  curType=type;
  document.getElementById("segIncome").className = type==="income"?"act-income":"";
  document.getElementById("segExpense").className = type==="expense"?"act-expense":"";
}
document.getElementById("segIncome").onclick=()=>setType("income");
document.getElementById("segExpense").onclick=()=>setType("expense");

document.getElementById("addBtn").onclick=()=>{
  const amt=parseFloat(document.getElementById("amtIn").value);
  if(isNaN(amt)||amt<=0){ alert(t("needAmt")); return; }
  records.push({
    date: document.getElementById("dateIn").value || todayStr(),
    type: curType,
    business: document.getElementById("bizSel").value,
    amount: Math.round(amt*100)/100,
    note: document.getElementById("noteIn").value.trim()
  });
  save();
  document.getElementById("amtIn").value=""; document.getElementById("noteIn").value="";
  renderAllViews(); checkMilestone();
};

document.body.addEventListener("click",e=>{
  if(e.target.classList.contains("del")){
    const i=parseInt(e.target.getAttribute("data-i"));
    if(confirm(t("confirmDel"))){ records.splice(i,1); save(); renderAllViews(); checkMilestone(); }
  }
});

document.getElementById("langBtn").onclick=()=>{ lang=lang==="zh"?"en":"zh"; localStorage.setItem("cdp_lang",lang); applyLang(); };

document.querySelectorAll("nav button").forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll("nav button").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    const tab=btn.getAttribute("data-tab");
    document.querySelectorAll(".view").forEach(v=>v.classList.remove("active"));
    document.getElementById("view-"+tab).classList.add("active");
    renderAllViews();
  };
});

document.getElementById("exportBtn").onclick=()=>{
  const blob=new Blob([JSON.stringify(records,null,2)],{type:"application/json"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
  a.download="pulse_data_"+todayStr()+".json"; a.click();
};
document.getElementById("importBtn").onclick=()=>document.getElementById("fileIn").click();
document.getElementById("fileIn").onchange=e=>{
  const f=e.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=()=>{ try{
    let data=JSON.parse(r.result);
    if(data.records) data=data.records;
    if(!Array.isArray(data)) throw 0;
    records=data.map(x=>({date:x.date, type:x.type, business:x.business, amount:Number(x.amount), note:x.note||""}));
    save(); renderAllViews(); checkMilestone(); alert("✓ "+records.length);
  }catch(err){ alert("❌ JSON"); } };
  r.readAsText(f);
};

/* ============ Init ============ */
document.getElementById("dateIn").value=todayStr();
setType("income");
applyLang();
if("serviceWorker" in navigator){ navigator.serviceWorker.register("sw.js").catch(()=>{}); }
</script>
</body>
</html>
